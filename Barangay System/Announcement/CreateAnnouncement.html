<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcement Creation Panel</title>
    <link rel="stylesheet" href="CreateAnnouncement.css">
    <script src="CreateAnnouncement.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="top-banner">
        <div class="logo-container">
            <img src="/Barangay System/HomePage/Images/LOGO.png" class="seal-placeholder" alt="Barangay Seal">
            <div class="seal-placeholder"></div>
            <h1>E-BARANGAY WEB PLATFORM</h1>
            <nav>
            <a href="/Barangay System/Staffs/Staff.html">Homepage</a>
            <a href="#"class = "active">Announcement</a>
            <a href="/Barangay System/BarangayLogin/Login.html">Logout</a>
       </nav> 
    </div>
    </header>

    <main class="container">
        <section class="panel creation-panel">
            <div class="panel-header">ANNOUNCEMENT CREATION PANEL</div>
            
            <form class="announcement-form" id="announcementForm">

    <div class="form-row">
        <select class="form-select" id="status">
            <option value="PUBLISHED">Publish</option>
            <option value="DRAFT">Draft</option>
            <option value="IMPORTANT">Important</option>
        </select>

        <select class="form-select" id="category">
            <option value="NEWS">Community News</option>
            <option value="SERVICES">Services</option>
            <option value="EVENTS">Events</option>
        </select>
    </div>

    <div class="form-group">
        <label>Announcement Title</label>
        <input type="text" id="title" placeholder="Announcement Title" required>
    </div>

    <div class="form-group">
        <label>Announcement Body</label>
        <textarea id="content" placeholder="Announcement Body" required></textarea>
    </div>

    <div class="button-row">
        <button type="submit" class="btn-publish">Publish</button>
        <button type="button" class="btn-draft" onclick="saveDraft()">Save as Draft</button>
    </div>

</form>

<p id="statusMessage"></p>
        </section>
    </main>

</body>
</html>
