<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay San Isidro - Request Status</title>
    <link rel="stylesheet" href="Status.css">
    <script src="Status.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo-placeholder">
                    <img src="/Barangay System/HomePage/Images/roosevelt logo practice.png" alt="logo" class="logo-placeholder">
                </div>
                <div class="header-text">
                    <h1>BARANGAY SAN ISIDRO</h1>
                    <p>REQUEST STATUS</p>
                </div>
            </div>

            <nav class="nav-menu">
                <div class="nav-item active">
                    <span>Barangay ID</span>
                    <span class="badge">0</span>
                </div>
                <div class="nav-item">
                    <span>Cedula</span>
                    <span class="badge">0</span>
                </div>
                <div class="nav-item">
                    <span>Complaints</span>
                    <span class="badge">0</span>
                </div>
                <div class="nav-item">
                    <span>Business Permit</span>
                    <span class="badge">0</span>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h2>REQUEST STATUS OVERVIEW</h2>
            </header>

            <!-- STATS -->
            <div class="stats-container">
                <div class="stat-card">
                    <p>Pending Request</p>
                    <div class="stat-value text-pending">
                        <i class="fa-regular fa-clock"></i> 0
                    </div>
                    <p class="sub-label">Request Pending</p>
                </div>

                <div class="stat-card">
                    <p>Approved Request</p>
                    <div class="stat-value text-approved">
                        <i class="fa-regular fa-circle-check"></i> 0
                    </div>
                    <p class="sub-label">Request Approved</p>
                </div>

                <div class="stat-card">
                    <p>Reject Request</p>
                    <div class="stat-value text-reject">
                        <i class="fa-regular fa-circle-xmark"></i> 0
                    </div>
                    <p class="sub-label">Request Reject</p>
                </div>
            </div>

            <!-- TABLE -->
            <section class="recent-requests">
                <h3>Recent Requests</h3>

                <div class="request-table" id="requestTable">
                    <!-- JS will insert rows here -->
                </div>
            </section>
        </main>
    </div>

    <!-- CONNECT JS -->
    <script src="Status.js"></script>

</body>
</html>
